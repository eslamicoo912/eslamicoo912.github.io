name: Deploy to GitHub Pages

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Github Identity
              run: |
                git config user.name "eslamicoo912"
                git config user.email "eslamicoo3@gmail.com"

            - name: Install dependencies
              run: npm install

            - name: Build
              run: npm run build

            - name: Deploy
              run: npx gh-pages -d dist